<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBT: Data Layer (Properties 5, 6, 11, 12, 14, 16, 17, 18)</title>
<style>
/* ═══ Test Runner Styles ═══ */
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 24px; background: #fafafa; color: #1a1c1e; }
h1 { font-size: 24px; margin-bottom: 8px; }
.subtitle { color: #5f6b7a; font-size: 14px; margin-bottom: 24px; }
.test-result { padding: 16px 20px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; line-height: 1.6; border-left: 4px solid; }
.test-result.pass { background: #f2fcf3; border-color: #16a34a; color: #065f46; }
.test-result.fail { background: #fff5f5; border-color: #dc2626; color: #991b1b; }
.test-result .label { font-weight: 700; margin-bottom: 4px; }
.test-result .detail { font-family: 'SF Mono', Menlo, monospace; font-size: 12px; white-space: pre-wrap; margin-top: 8px; background: rgba(0,0,0,0.04); padding: 8px 12px; border-radius: 4px; }
.summary { margin-top: 24px; padding: 16px 20px; border-radius: 8px; font-weight: 600; font-size: 15px; }
.summary.all-pass { background: #d1fae5; color: #065f46; }
.summary.has-fail { background: #fecaca; color: #991b1b; }
</style>
</head>
<body>

<h1>Property-Based Tests: Data Layer</h1>
<p class="subtitle">Properties 5, 6, 11, 12, 14, 16, 17, 18 · Validates Requirements 4.2, 4.5, 5.2, 5.3, 8.1–8.3, 9.2, 11.1, 11.3, 12.2–12.4, 13.1, 13.3, 14.1–14.3, 14.5</p>

<div id="results"></div>

<!-- Load PSP namespace and data files -->
<script src="../psp-namespace.js"></script>
<script src="../data/motion-tokens.js"></script>
<script src="../data/themes.js"></script>
<script src="../data/guidance.js"></script>
<script src="../data/breakpoints.js"></script>
<script src="../data/code-examples.js"></script>
<script src="../data/changelog.js"></script>
<script src="../data/components.js"></script>

<!-- Load fast-check -->
<script src="https://cdn.jsdelivr.net/npm/fast-check/lib/bundle.js"></script>

<script>
(function() {
  var results = [];
  var resultsEl = document.getElementById('results');

  function addResult(name, passed, detail) {
    results.push({ name: name, passed: passed, detail: detail });
    var div = document.createElement('div');
    div.className = 'test-result ' + (passed ? 'pass' : 'fail');
    div.innerHTML = '<div class="label">' + (passed ? '✓ PASS' : '✗ FAIL') + ': ' + name + '</div>'
      + (detail ? '<div class="detail">' + detail + '</div>' : '');
    resultsEl.appendChild(div);
  }

  function showSummary() {
    var total = results.length;
    var passed = results.filter(function(r) { return r.passed; }).length;
    var failed = total - passed;
    var div = document.createElement('div');
    div.className = 'summary ' + (failed === 0 ? 'all-pass' : 'has-fail');
    div.textContent = passed + '/' + total + ' properties passed' + (failed > 0 ? ' (' + failed + ' failed)' : '');
    resultsEl.appendChild(div);
  }

  // ═══════════════════════════════════════════════════════════════
  // Property 5: Motion token structure and categorization
  // **Validates: Requirements 4.2, 4.5**
  //
  // For any motion token: duration is positive number, easing is
  // cubic-bezier string, properties is non-empty array, and category
  // is correctly derived (<200ms=micro, 200-500ms=standard, >500ms=complex).
  // ═══════════════════════════════════════════════════════════════

  try {
    var tokenKeys = Object.keys(window.PSP.data.motionTokens);

    fc.assert(fc.property(
      fc.constantFrom.apply(fc, tokenKeys),
      function(tokenKey) {
        var token = window.PSP.data.motionTokens[tokenKey];

        // Must have name (string)
        if (typeof token.name !== 'string' || token.name.length === 0) return false;

        // Duration must be a positive number
        if (typeof token.duration !== 'number' || token.duration <= 0) return false;

        // Easing must be a valid cubic-bezier string
        if (typeof token.easing !== 'string' || !/^cubic-bezier\(.+\)$/.test(token.easing)) return false;

        // Properties must be a non-empty array of strings
        if (!Array.isArray(token.properties) || token.properties.length === 0) return false;
        for (var i = 0; i < token.properties.length; i++) {
          if (typeof token.properties[i] !== 'string' || token.properties[i].length === 0) return false;
        }

        // Category must be correctly derived from duration
        var expectedCategory;
        if (token.duration < 200) expectedCategory = 'micro';
        else if (token.duration <= 500) expectedCategory = 'standard';
        else expectedCategory = 'complex';

        if (token.category !== expectedCategory) return false;

        return true;
      }
    ), { numRuns: 100 });

    addResult('Property 5: Motion token structure and categorization', true,
      'Validated: All ' + tokenKeys.length + ' motion tokens have valid name, positive duration, cubic-bezier easing, non-empty properties array, and correct category derivation.\n100 runs passed.');
  } catch (e) {
    addResult('Property 5: Motion token structure and categorization', false,
      'Counterexample: ' + (e.message || String(e)));
  }

  // ═══════════════════════════════════════════════════════════════
  // Property 6: Dark mode color completeness
  // **Validates: Requirements 5.2, 5.3**
  //
  // For any color role in the light theme, a corresponding entry
  // exists in the dark theme with a different value.
  // ═══════════════════════════════════════════════════════════════

  try {
    var lightKeys = Object.keys(window.PSP.data.themes.light);
    var darkTheme = window.PSP.data.themes.dark;

    fc.assert(fc.property(
      fc.constantFrom.apply(fc, lightKeys),
      function(colorKey) {
        // Dark theme must have the same key
        if (!(colorKey in darkTheme)) return false;

        // Dark value must differ from light value
        var lightVal = window.PSP.data.themes.light[colorKey];
        var darkVal = darkTheme[colorKey];
        if (lightVal === darkVal) return false;

        return true;
      }
    ), { numRuns: 100 });

    addResult('Property 6: Dark mode color completeness', true,
      'Validated: All ' + lightKeys.length + ' light theme keys have corresponding dark theme keys with different values.\n100 runs passed.');
  } catch (e) {
    addResult('Property 6: Dark mode color completeness', false,
      'Counterexample: ' + (e.message || String(e)));
  }

  // ═══════════════════════════════════════════════════════════════
  // Property 11: Usage guidance completeness
  // **Validates: Requirements 8.1, 8.2, 8.3**
  //
  // For any component in the registry, usage guidance has ≥3
  // whenToUse scenarios and ≥2 whenNotToUse anti-patterns, each
  // anti-pattern has a non-empty alternative.
  // ═══════════════════════════════════════════════════════════════

  try {
    var guidanceKeys = Object.keys(window.PSP.data.guidance);

    fc.assert(fc.property(
      fc.constantFrom.apply(fc, guidanceKeys),
      function(componentKey) {
        var guidance = window.PSP.data.guidance[componentKey];

        // Must have at least 3 whenToUse scenarios
        if (!Array.isArray(guidance.whenToUse) || guidance.whenToUse.length < 3) return false;

        // Each whenToUse must have scenario and explanation
        for (var i = 0; i < guidance.whenToUse.length; i++) {
          var wtu = guidance.whenToUse[i];
          if (typeof wtu.scenario !== 'string' || wtu.scenario.length === 0) return false;
          if (typeof wtu.explanation !== 'string' || wtu.explanation.length === 0) return false;
        }

        // Must have at least 2 whenNotToUse anti-patterns
        if (!Array.isArray(guidance.whenNotToUse) || guidance.whenNotToUse.length < 2) return false;

        // Each whenNotToUse must have scenario, explanation, and non-empty alternative
        for (var j = 0; j < guidance.whenNotToUse.length; j++) {
          var wntu = guidance.whenNotToUse[j];
          if (typeof wntu.scenario !== 'string' || wntu.scenario.length === 0) return false;
          if (typeof wntu.explanation !== 'string' || wntu.explanation.length === 0) return false;
          if (typeof wntu.alternative !== 'string' || wntu.alternative.length === 0) return false;
        }

        return true;
      }
    ), { numRuns: 100 });

    addResult('Property 11: Usage guidance completeness', true,
      'Validated: All ' + guidanceKeys.length + ' components have ≥3 whenToUse scenarios and ≥2 whenNotToUse anti-patterns with alternatives.\n100 runs passed.');
  } catch (e) {
    addResult('Property 11: Usage guidance completeness', false,
      'Counterexample: ' + (e.message || String(e)));
  }

  // ═══════════════════════════════════════════════════════════════
  // Property 12: Breakpoint specification completeness
  // **Validates: Requirements 9.2**
  //
  // 4 breakpoints defined (mobile, tablet, desktop, largeDesktop),
  // each with columns (positive integer), spacing (valid token ref),
  // and at least one component size modification.
  // ═══════════════════════════════════════════════════════════════

  try {
    var breakpointKeys = Object.keys(window.PSP.data.breakpoints);
    var requiredBreakpoints = ['mobile', 'tablet', 'desktop', 'largeDesktop'];

    // First verify all 4 required breakpoints exist
    var allPresent = requiredBreakpoints.every(function(bp) {
      return breakpointKeys.indexOf(bp) !== -1;
    });
    if (!allPresent) throw new Error('Missing required breakpoints. Found: ' + breakpointKeys.join(', '));

    fc.assert(fc.property(
      fc.constantFrom.apply(fc, requiredBreakpoints),
      function(bpKey) {
        var bp = window.PSP.data.breakpoints[bpKey];

        // Columns must be a positive integer
        if (typeof bp.columns !== 'number' || bp.columns <= 0 || bp.columns !== Math.floor(bp.columns)) return false;

        // Spacing must be a valid token reference (string starting with --)
        if (typeof bp.spacing !== 'string' || !bp.spacing.startsWith('--')) return false;

        // componentSizes must be an object with at least one entry
        if (typeof bp.componentSizes !== 'object' || bp.componentSizes === null) return false;
        if (Object.keys(bp.componentSizes).length < 1) return false;

        return true;
      }
    ), { numRuns: 100 });

    addResult('Property 12: Breakpoint specification completeness', true,
      'Validated: All 4 breakpoints (mobile, tablet, desktop, largeDesktop) have positive integer columns, valid spacing token, and ≥1 component size modification.\n100 runs passed.');
  } catch (e) {
    addResult('Property 12: Breakpoint specification completeness', false,
      'Counterexample: ' + (e.message || String(e)));
  }

  // ═══════════════════════════════════════════════════════════════
  // Property 14: Multi-platform code example coverage
  // **Validates: Requirements 11.1, 11.3**
  //
  // Each component has code in 4 formats (html, reactNative, android,
  // ios), each with language, label, and code fields.
  // ═══════════════════════════════════════════════════════════════

  try {
    var codeExampleKeys = Object.keys(window.PSP.data.codeExamples);
    var requiredFormats = ['html', 'reactNative', 'android', 'ios'];

    fc.assert(fc.property(
      fc.constantFrom.apply(fc, codeExampleKeys),
      function(componentKey) {
        var examples = window.PSP.data.codeExamples[componentKey];

        // Must have all 4 platform formats
        for (var i = 0; i < requiredFormats.length; i++) {
          var format = requiredFormats[i];
          if (!(format in examples)) return false;

          var example = examples[format];

          // Each example must have language (string), label (string), code (string)
          if (typeof example.language !== 'string' || example.language.length === 0) return false;
          if (typeof example.label !== 'string' || example.label.length === 0) return false;
          if (typeof example.code !== 'string' || example.code.length === 0) return false;
        }

        return true;
      }
    ), { numRuns: 100 });

    addResult('Property 14: Multi-platform code example coverage', true,
      'Validated: All ' + codeExampleKeys.length + ' components have code examples in 4 formats (html, reactNative, android, ios) with language, label, and code fields.\n100 runs passed.');
  } catch (e) {
    addResult('Property 14: Multi-platform code example coverage', false,
      'Counterexample: ' + (e.message || String(e)));
  }

  // ═══════════════════════════════════════════════════════════════
  // Property 16: Changelog entry structure and ordering
  // **Validates: Requirements 12.2, 12.3, 12.4**
  //
  // Each entry has version (non-empty), date (valid ISO), type,
  // tokenName (non-empty), newValue (non-empty). Modifications have
  // previousValue. Entries are in reverse chronological order.
  // ═══════════════════════════════════════════════════════════════

  try {
    var changelog = window.PSP.data.changelog;
    var changelogIndices = [];
    for (var ci = 0; ci < changelog.length; ci++) changelogIndices.push(ci);

    // Test individual entry structure
    fc.assert(fc.property(
      fc.constantFrom.apply(fc, changelogIndices),
      function(idx) {
        var entry = changelog[idx];

        // version must be non-empty string
        if (typeof entry.version !== 'string' || entry.version.length === 0) return false;

        // date must be valid ISO date (YYYY-MM-DD)
        if (typeof entry.date !== 'string') return false;
        var dateRegex = /^\d{4}-\d{2}-\d{2}$/;
        if (!dateRegex.test(entry.date)) return false;
        var parsed = new Date(entry.date);
        if (isNaN(parsed.getTime())) return false;

        // type must be one of addition, modification, deprecation
        var validTypes = ['addition', 'modification', 'deprecation'];
        if (validTypes.indexOf(entry.type) === -1) return false;

        // tokenName must be non-empty string
        if (typeof entry.tokenName !== 'string' || entry.tokenName.length === 0) return false;

        // newValue must be non-empty string
        if (typeof entry.newValue !== 'string' || entry.newValue.length === 0) return false;

        // For modifications, previousValue must be non-empty string
        if (entry.type === 'modification') {
          if (typeof entry.previousValue !== 'string' || entry.previousValue.length === 0) return false;
        }

        return true;
      }
    ), { numRuns: 100 });

    // Test reverse chronological ordering
    var orderingValid = true;
    var orderingDetail = '';
    for (var oi = 0; oi < changelog.length - 1; oi++) {
      var currentDate = new Date(changelog[oi].date);
      var nextDate = new Date(changelog[oi + 1].date);
      if (currentDate < nextDate) {
        orderingValid = false;
        orderingDetail = 'Entry at index ' + oi + ' (date: ' + changelog[oi].date + ') is older than entry at index ' + (oi + 1) + ' (date: ' + changelog[oi + 1].date + ')';
        break;
      }
    }

    if (!orderingValid) {
      addResult('Property 16: Changelog entry structure and ordering', false, orderingDetail);
    } else {
      addResult('Property 16: Changelog entry structure and ordering', true,
        'Validated: All ' + changelog.length + ' entries have valid structure (version, ISO date, type, tokenName, newValue). Modifications have previousValue. Reverse chronological order confirmed.\n100 runs passed.');
    }
  } catch (e) {
    addResult('Property 16: Changelog entry structure and ordering', false,
      'Counterexample: ' + (e.message || String(e)));
  }

  // ═══════════════════════════════════════════════════════════════
  // Property 17: Edge case documentation coverage
  // **Validates: Requirements 13.1, 13.3**
  //
  // Components have states/edge cases documented in their registry.
  // Each component has states object with documented interaction states.
  // ═══════════════════════════════════════════════════════════════

  try {
    var componentKeys = Object.keys(window.PSP.data.components);
    var requiredStates = ['enabled', 'disabled', 'hovered', 'focused', 'pressed', 'dragged'];

    fc.assert(fc.property(
      fc.constantFrom.apply(fc, componentKeys),
      function(componentKey) {
        var component = window.PSP.data.components[componentKey];

        // Must have states object
        if (typeof component.states !== 'object' || component.states === null) return false;

        // Must document all 6 interaction states (value can be null for N/A)
        for (var i = 0; i < requiredStates.length; i++) {
          var stateName = requiredStates[i];
          if (!(stateName in component.states)) return false;

          var stateSpec = component.states[stateName];
          // If state is applicable (not null), it must have bg, border, opacity
          if (stateSpec !== null) {
            if (typeof stateSpec.bg !== 'string' || stateSpec.bg.length === 0) return false;
            if (typeof stateSpec.border !== 'string') return false;
            if (typeof stateSpec.opacity !== 'number') return false;
          }
        }

        // Disabled state (if applicable) should have a reason for edge case documentation
        var disabledState = component.states.disabled;
        if (disabledState !== null) {
          if (typeof disabledState.reason !== 'string' || disabledState.reason.length === 0) return false;
        }

        return true;
      }
    ), { numRuns: 100 });

    addResult('Property 17: Edge case documentation coverage', true,
      'Validated: All ' + componentKeys.length + ' components have all 6 interaction states documented. Applicable states have bg/border/opacity. Disabled states have reason text for edge case context.\n100 runs passed.');
  } catch (e) {
    addResult('Property 17: Edge case documentation coverage', false,
      'Counterexample: ' + (e.message || String(e)));
  }

  // ═══════════════════════════════════════════════════════════════
  // Property 18: Accessibility documentation completeness
  // **Validates: Requirements 14.1, 14.2, 14.3, 14.5**
  //
  // Each component has a11y spec with role, at least one state
  // announcement, keyboard navigation patterns, and compliance
  // info (minTouchTarget, contrastRatio).
  // ═══════════════════════════════════════════════════════════════

  try {
    var a11yComponentKeys = Object.keys(window.PSP.data.components);

    fc.assert(fc.property(
      fc.constantFrom.apply(fc, a11yComponentKeys),
      function(componentKey) {
        var component = window.PSP.data.components[componentKey];

        // Must have a11y object
        if (typeof component.a11y !== 'object' || component.a11y === null) return false;

        var a11y = component.a11y;

        // Must have ARIA role (non-empty string)
        if (typeof a11y.role !== 'string' || a11y.role.length === 0) return false;

        // Must have ariaLabel (non-empty string)
        if (typeof a11y.ariaLabel !== 'string' || a11y.ariaLabel.length === 0) return false;

        // Must have at least one state announcement
        if (typeof a11y.stateAnnouncements !== 'object' || a11y.stateAnnouncements === null) return false;
        if (Object.keys(a11y.stateAnnouncements).length < 1) return false;

        // Each state announcement must be a non-empty string
        var announcements = Object.keys(a11y.stateAnnouncements);
        for (var i = 0; i < announcements.length; i++) {
          if (typeof a11y.stateAnnouncements[announcements[i]] !== 'string') return false;
          if (a11y.stateAnnouncements[announcements[i]].length === 0) return false;
        }

        // Must have keyboard navigation patterns
        if (typeof a11y.keyboardNav !== 'object' || a11y.keyboardNav === null) return false;
        if (Object.keys(a11y.keyboardNav).length < 1) return false;

        // Must have minTouchTarget (compliance checklist item)
        if (typeof a11y.minTouchTarget !== 'string' || a11y.minTouchTarget.length === 0) return false;

        // Must have contrastRatio (compliance checklist item)
        if (typeof a11y.contrastRatio !== 'string' || a11y.contrastRatio.length === 0) return false;

        return true;
      }
    ), { numRuns: 100 });

    addResult('Property 18: Accessibility documentation completeness', true,
      'Validated: All ' + a11yComponentKeys.length + ' components have a11y specs with role, ariaLabel, ≥1 state announcement, keyboard nav patterns, minTouchTarget, and contrastRatio.\n100 runs passed.');
  } catch (e) {
    addResult('Property 18: Accessibility documentation completeness', false,
      'Counterexample: ' + (e.message || String(e)));
  }

  // Show summary
  showSummary();
})();
</script>
</body>
</html>
