<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSP Design System · v2.0.0</title>
<style>
@import url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/400.css');
@import url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/500.css');
@import url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/600.css');
@import url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/700.css');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  /* ═══ Material Design 3 Type Scale ═══ */
  --type-display-large:57px;--type-display-large-weight:400;--type-display-large-tracking:-0.25px;--type-display-large-height:64px;
  --type-display-medium:45px;--type-display-medium-weight:400;--type-display-medium-tracking:0;--type-display-medium-height:52px;
  --type-display-small:36px;--type-display-small-weight:400;--type-display-small-tracking:0;--type-display-small-height:44px;
  --type-headline-large:32px;--type-headline-large-weight:400;--type-headline-large-tracking:0;--type-headline-large-height:40px;
  --type-headline-medium:28px;--type-headline-medium-weight:400;--type-headline-medium-tracking:0;--type-headline-medium-height:36px;
  --type-headline-small:24px;--type-headline-small-weight:400;--type-headline-small-tracking:0;--type-headline-small-height:32px;
  --type-title-large:22px;--type-title-large-weight:400;--type-title-large-tracking:0;--type-title-large-height:28px;
  --type-title-medium:16px;--type-title-medium-weight:500;--type-title-medium-tracking:0.15px;--type-title-medium-height:24px;
  --type-title-small:14px;--type-title-small-weight:500;--type-title-small-tracking:0.1px;--type-title-small-height:20px;
  --type-body-large:16px;--type-body-large-weight:400;--type-body-large-tracking:0.5px;--type-body-large-height:24px;
  --type-body-medium:14px;--type-body-medium-weight:400;--type-body-medium-tracking:0.25px;--type-body-medium-height:20px;
  --type-body-small:12px;--type-body-small-weight:400;--type-body-small-tracking:0.4px;--type-body-small-height:16px;
  --type-label-large:14px;--type-label-large-weight:500;--type-label-large-tracking:0.1px;--type-label-large-height:20px;
  --type-label-medium:12px;--type-label-medium-weight:500;--type-label-medium-tracking:0.5px;--type-label-medium-height:16px;
  --type-label-small:11px;--type-label-small-weight:500;--type-label-small-tracking:0.5px;--type-label-small-height:16px;
  
  /* ═══ Unified Color System (Role-Based — Amazon RIO) ═══ */
  --color-primary:#FF9900;--color-on-primary:#ffffff;--color-primary-container:#FFF3E0;--color-on-primary-container:#3B2000;
  --color-secondary:#232f3e;--color-on-secondary:#ffffff;--color-secondary-container:#e8eaed;--color-on-secondary-container:#0F1111;
  --color-tertiary:#146eb4;--color-on-tertiary:#ffffff;--color-tertiary-container:#e3f2fd;--color-on-tertiary-container:#002b4d;
  --color-error:#d32f2f;--color-on-error:#ffffff;--color-error-container:#ffdad6;--color-on-error-container:#410002;
  --color-success:#067D62;--color-on-success:#ffffff;--color-success-container:#d1fae5;--color-on-success-container:#052e16;
  --color-warning:#d97706;--color-on-warning:#ffffff;--color-warning-container:#fef3c7;--color-on-warning-container:#422006;
  --color-surface:#ffffff;--color-on-surface:#0F1111;--color-surface-variant:#f3f3f3;--color-on-surface-variant:#565959;
  --color-outline:#888c8c;--color-outline-variant:#d5d9d9;--color-background:#ffffff;--color-on-background:#0F1111;
  
  /* ═══ Elevation System (Material Design 3) ═══ */
  --elevation-0:none;
  --elevation-1:0 1px 2px 0 rgba(0,0,0,0.3),0 1px 3px 1px rgba(0,0,0,0.15);
  --elevation-2:0 1px 2px 0 rgba(0,0,0,0.3),0 2px 6px 2px rgba(0,0,0,0.15);
  --elevation-3:0 4px 8px 3px rgba(0,0,0,0.15),0 1px 3px rgba(0,0,0,0.3);
  --elevation-4:0 6px 10px 4px rgba(0,0,0,0.15),0 2px 3px rgba(0,0,0,0.3);
  --elevation-5:0 8px 12px 6px rgba(0,0,0,0.15),0 4px 4px rgba(0,0,0,0.3);
  
  /* ═══ Spacing Scale (8px baseline) ═══ */
  --space-0:0;--space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;
  --space-5:20px;--space-6:24px;--space-7:28px;--space-8:32px;--space-10:40px;
  --space-12:48px;--space-16:64px;--space-20:80px;--space-24:96px;
  
  /* ═══ Border Radius Scale ═══ */
  --radius-none:0;--radius-xs:4px;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;--radius-full:9999px;
  
  /* ═══ Legacy PSP Tokens (for backward compatibility) ═══ */
  --psp-page:#F7FAFA;--psp-primary:#0F1111;--psp-secondary:#565959;
  --psp-link:#2162A1;--psp-success:#0B7B3C;--psp-border:#D5D9D9;
  --psp-badge-blue:#0A7CD1;--psp-cta:#FFD814;--psp-selected-bg:#EDF8FF;
  --psp-selected-border:#2162A1;--psp-error:#CC0C39;--psp-badge-gray-bg:#E3E6E6;
  --psp-badge-gray-text:#232F3E;--psp-savings:#E8FFF8;--psp-address:#F7FEFF;--psp-divider:#6F7373;
}

/* ═══ Dark Mode Color Overrides ═══ */
[data-theme="dark"]{
  --color-primary:#a8c8ff;
  --color-on-primary:#003258;
  --color-primary-container:#0b4a7d;
  --color-on-primary-container:#d1e4ff;
  --color-secondary:#bbc7db;
  --color-on-secondary:#263141;
  --color-secondary-container:#3c4858;
  --color-on-secondary-container:#d7e3f7;
  --color-tertiary:#d7bee4;
  --color-on-tertiary:#3c2948;
  --color-tertiary-container:#533f5f;
  --color-on-tertiary-container:#f2daff;
  --color-error:#ffb4ab;
  --color-on-error:#690005;
  --color-error-container:#93000a;
  --color-on-error-container:#ffdad6;
  --color-success:#6ee7a0;
  --color-on-success:#003919;
  --color-success-container:#0a5c2f;
  --color-on-success-container:#d1fae5;
  --color-warning:#ffc46b;
  --color-on-warning:#462b00;
  --color-warning-container:#6b3f00;
  --color-on-warning-container:#fef3c7;
  --color-surface:#1a1c1e;
  --color-on-surface:#e3e2e6;
  --color-surface-variant:#44474e;
  --color-on-surface-variant:#c4c6d0;
  --color-outline:#8e9099;
  --color-outline-variant:#44474e;
  --color-background:#1a1c1e;
  --color-on-background:#e3e2e6;
}
[data-theme="dark"] .sidebar{background:#1a1c1e;border-right-color:#333}
[data-theme="dark"] .sidebar-header{border-bottom-color:#333}
[data-theme="dark"] .sidebar-logo{color:#e3e2e6}
[data-theme="dark"] .sidebar-logo-sub{color:#9ca3af}
[data-theme="dark"] .sidebar-version{background:#2c2c2e;color:#9ca3af}
[data-theme="dark"] .nav-group-title{color:#9ca3af}
[data-theme="dark"] .nav-item{color:#c4c6d0}
[data-theme="dark"] .nav-item:hover{background:#2c2c2e;color:#e3e2e6}
[data-theme="dark"] .nav-item.active{background:#1e3a5f;color:#a8c8ff}
[data-theme="dark"] .sidebar-footer{border-top-color:#333;color:#9ca3af}
[data-theme="dark"] .content-wrap{background:#1a1c1e}
[data-theme="dark"] .card{background:#2c2c2e;border-color:#44474e;color:#e3e2e6}
[data-theme="dark"] .card-title{color:#e3e2e6;border-bottom-color:#44474e}
[data-theme="dark"] .stat-card{background:#2c2c2e;border-color:#44474e}
[data-theme="dark"] .stat-label{color:#9ca3af}
[data-theme="dark"] .tbl th{background:#1a1c1e;color:#c4c6d0;border-bottom-color:#44474e}
[data-theme="dark"] .tbl td{color:#e3e2e6;border-bottom-color:#333}
[data-theme="dark"] .tbl tr:hover td{background:#333}
[data-theme="dark"] .tbl-wrap{border-color:#44474e}
[data-theme="dark"] .section-header{background:linear-gradient(135deg,#1e2328 0%,#252d35 100%);border-left-color:#a8c8ff}
[data-theme="dark"] .section-header__title{color:#e3e2e6}
[data-theme="dark"] .section-header__desc{color:#9ca3af}
[data-theme="dark"] .note{background:#2c2200;border-color:#5c4800;color:#ffc46b}
[data-theme="dark"] .note-blue{background:#1a2400;border-color:#3d5c00;color:#bef264}
[data-theme="dark"] .warn{background:#2c0a0a;border-color:#5c1a1a;color:#fca5a5}
[data-theme="dark"] .do{background:#0a2c1a;border-color:#1a5c3a;color:#6ee7a0}
[data-theme="dark"] .dont{background:#2c0a0a;border-color:#5c1a1a;color:#fca5a5}
[data-theme="dark"] .do strong{color:#6ee7a0}
[data-theme="dark"] .dont strong{color:#fca5a5}
[data-theme="dark"] .preview{background:#1a1c1e;border-color:#44474e}
[data-theme="dark"] .spec{background:#252d35;border-color:#44474e;color:#9ca3af}
[data-theme="dark"] .spec:hover{background:#2c2200;border-color:#ffc46b;color:#ffc46b}
[data-theme="dark"] .code-block{background:#0f172a}
[data-theme="dark"] .code-toggle{background:#252d35;border-color:#44474e;color:#9ca3af}
[data-theme="dark"] .code-toggle:hover{background:#2c2200;border-color:#ffc46b;color:#ffc46b}
[data-theme="dark"] .hero{background:linear-gradient(135deg,#1a2e44 0%,#2d4a6b 100%)}
[data-theme="dark"] .bcx-hero{border-color:#44474e}
[data-theme="dark"] .site-footer{background:#1a1c1e;border-top-color:#333;color:#9ca3af}
[data-theme="dark"] .flow-num{background:#a8c8ff;color:#001d36}
[data-theme="dark"] .state-active{background:#0a2c1a;border-color:#1a5c3a;color:#6ee7a0}
[data-theme="dark"] .state-selected{background:#0a1a2c;border-color:#1a3a5c;color:#a8c8ff}
[data-theme="dark"] .state-disabled{background:#252525;border-color:#444;color:#9ca3af}
[data-theme="dark"] .state-service{background:#2c2200;border-color:#5c4800;color:#ffc46b}
[data-theme="dark"] .callout{background:#252d35;border-color:#44474e}
[data-theme="dark"] .callout strong{color:#e3e2e6}
[data-theme="dark"] .ann strong{color:#e3e2e6}
[data-theme="dark"] .ann span{color:#9ca3af}
[data-theme="dark"] .grid-2 .card{color:#e3e2e6}
[data-theme="dark"] .card--elevated{background:#2c2c2e;box-shadow:0 1px 3px rgba(0,0,0,.3)}
[data-theme="dark"] .card--filled{background:#252d35}
[data-theme="dark"] .card--outlined{background:#2c2c2e;border-color:#44474e}

body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--color-background);color:var(--color-on-background);font-size:var(--type-body-medium);line-height:var(--type-body-medium-height);letter-spacing:var(--type-body-medium-tracking);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased;transition:background-color 0.3s,color 0.3s}
.sidebar{width:260px;background:#fff;border-right:1px solid #e8eaed;height:100vh;position:fixed;left:0;top:0;overflow-y:auto;z-index:200;display:flex;flex-direction:column;padding:0;transition:transform .3s ease,background-color 0.3s}
.sidebar-header{padding:20px 24px 16px;border-bottom:1px solid #f0f0f0}
.sidebar-logo{font-size:18px;font-weight:700;color:#1a1c1e;letter-spacing:-0.3px}
.sidebar-logo-sub{font-size:13px;color:#5f6368;margin-top:2px;font-weight:400}
.sidebar-version{display:inline-block;background:#f1f3f4;color:#5f6368;font-size:11px;font-weight:600;letter-spacing:0.3px;padding:3px 10px;border-radius:12px;margin-top:8px}
.sidebar-nav{flex:1;padding:12px 12px;overflow-y:auto}
.nav-group-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:#5f6368;padding:20px 12px 6px;margin:0}
.nav-group-title:first-child{padding-top:8px}
.nav-item{display:flex;align-items:center;gap:0;padding:8px 16px;margin:1px 0;border-radius:24px;font-size:13px;font-weight:450;color:#1f1f1f;cursor:pointer;transition:background 0.15s ease,color 0.15s ease;text-decoration:none;line-height:1.4;border-left:none}
.nav-item:hover{background:#f1f3f4;color:#1f1f1f}
.nav-item.active{background:#d3e3fd;color:#001d36;font-weight:550}
.nav-icon{display:none}
.nav-badge{margin-left:auto;font-size:11px;font-weight:600;color:#5f6368;background:#f1f3f4;padding:2px 8px;border-radius:10px;min-width:24px;text-align:center}
.nav-item.active .nav-badge{background:rgba(9,114,211,.12);color:#0972d3}
.sidebar-footer{padding:16px 24px;border-top:1px solid #f0f0f0;font-size:12px;color:#5f6368;display:flex;justify-content:space-between;align-items:center}
.sidebar-footer a{color:#0972d3;text-decoration:none;font-weight:500}
.sidebar-footer a:hover{color:#065aa3}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:300;width:40px;height:40px;border-radius:8px;background:#fff;border:1px solid #e8eaed;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.hamburger span{display:block;width:18px;height:2px;background:#1a1c1e;margin:3px auto;border-radius:1px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;backdrop-filter:blur(2px)}
.content-wrap{margin-left:260px;flex:1;min-height:100vh;display:flex;flex-direction:column;background:#fafbfc;transition:background-color 0.3s}
.content{max-width:960px;width:100%;margin:0 auto;padding:24px 32px;flex:1}
.sec{display:none;animation:fadeIn .25s ease}.sec.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.hero{background:#FF9900;border-radius:16px;padding:48px 56px;margin-bottom:32px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:transparent;pointer-events:none}
.hero-logo{position:absolute;top:20px;left:28px;width:120px;height:auto;z-index:2}
.hero-badge{display:inline-block;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);color:#ffffff;font-size:var(--type-label-medium);font-weight:var(--type-label-medium-weight);letter-spacing:var(--type-label-medium-tracking);padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);margin-bottom:var(--space-4);border:1px solid rgba(255,255,255,.3);position:relative;z-index:1}
.hero-title{font-size:var(--type-display-medium);font-weight:700;letter-spacing:var(--type-display-medium-tracking);line-height:var(--type-display-medium-height);color:#ffffff;margin-bottom:var(--space-4);position:relative;z-index:1}
.hero-desc{font-size:var(--type-body-large);font-weight:500;letter-spacing:var(--type-body-large-tracking);line-height:var(--type-body-large-height);color:rgba(255,255,255,0.9);margin-bottom:var(--space-7);max-width:680px;position:relative;z-index:1}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-6);border-radius:var(--radius-sm);font-size:var(--type-label-large);font-weight:var(--type-label-large-weight);letter-spacing:var(--type-label-large-tracking);line-height:var(--type-label-large-height);cursor:pointer;transition:all .2s;text-decoration:none;border:none;font-family:inherit}
.btn-primary{background:#232f3e;color:#ffffff;border-radius:20px;padding:10px 24px;font-weight:600;box-shadow:none}
.btn-primary:hover{background:#37475a;transform:translateY(-2px);box-shadow:var(--elevation-3)}
.btn-secondary{background:transparent;color:#ffffff;border:1.5px solid rgba(255,255,255,0.6);border-radius:20px;padding:10px 24px;font-weight:600}
.btn-secondary:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.9)}
.page-title{font-size:var(--type-headline-medium);font-weight:var(--type-headline-medium-weight);letter-spacing:var(--type-headline-medium-tracking);line-height:var(--type-headline-medium-height);color:var(--color-on-surface);margin-bottom:var(--space-2)}
.page-desc{font-size:var(--type-body-large);font-weight:var(--type-body-large-weight);letter-spacing:var(--type-body-large-tracking);line-height:var(--type-body-large-height);color:var(--color-on-surface-variant);margin-bottom:var(--space-8);max-width:720px}
.card{background:#fff;border:1px solid #e3e5e8;border-radius:8px;padding:0;margin-bottom:20px;overflow:hidden;transition:background-color 0.3s,border-color 0.3s}
.card:hover{border-color:#d0d3d6}
/* Card Variants */
.card--elevated{background:#fff;border:none;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06)}
.card--elevated:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card--filled{background:var(--color-surface-variant);border:none;border-radius:8px;box-shadow:none}
.card--filled:hover{box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card--outlined{background:#fff;border:1px solid #e3e5e8;border-radius:8px;box-shadow:none}
.card--outlined:hover{border-color:#d0d3d6}
/* Card Content Density */
.card-body{padding:var(--space-6) var(--space-7);max-width:720px}
.card-separator{height:1px;background:var(--color-surface-variant);margin:var(--space-4) 0}
.card-caption{font-size:var(--type-body-small);color:var(--color-on-surface-variant);line-height:var(--type-body-small-height);letter-spacing:var(--type-body-small-tracking);margin-top:var(--space-2)}
.card-title{font-size:15px;font-weight:600;letter-spacing:0;line-height:1.4;color:#1a1c1e;margin-bottom:0;padding:16px 20px 12px;border-bottom:1px solid #f0f2f4}
.preview{background:#fafafa;border:1px solid #e9ebed;border-radius:8px;padding:32px;display:flex;justify-content:center;align-items:center;min-height:80px;flex-wrap:wrap;margin:20px 28px 20px}
.spec{font-size:12px;color:#5a6c7d;font-family:'SF Mono',Menlo,Consolas,monospace;background:#f7f8f9;border:1px solid #e3e6e8;padding:8px 14px;border-radius:6px;margin:0 28px 24px;cursor:pointer;transition:all .2s;display:inline-block;word-break:break-all;line-height:1.6}
.spec:hover{background:#FFF3E0;border-color:#FF9900;color:#FF9900}
.code-block{background:#1e293b;color:#e2e8f0;padding:20px 24px;border-radius:var(--radius-md);font-family:'SF Mono',Menlo,Consolas,monospace;font-size:13px;line-height:1.7;margin:0 28px 24px;overflow-x:auto;position:relative;display:none}
.code-block.visible{display:block}
.code-toggle{display:inline-flex;align-items:center;gap:6px;margin:0 28px 16px;padding:6px 14px;border-radius:6px;border:1px solid #e3e6e8;background:#f7f8f9;font-size:12px;font-weight:600;color:#5f6b7a;cursor:pointer;transition:all .15s}
.code-toggle:hover{background:#FFF3E0;border-color:#FF9900;color:#FF9900}
.code-toggle.open{background:#FFF3E0;border-color:#FF9900;color:#FF9900}
.code-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.1)}
.code-block-title{font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.code-copy-btn{background:rgba(255,255,255,.1);color:#e2e8f0;border:1px solid rgba(255,255,255,.2);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.code-copy-btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3)}
.code-line{display:block}.code-comment{color:#64748b}.code-tag{color:#38bdf8}.code-attr{color:#fb7185}.code-value{color:#a78bfa}.code-text{color:#e2e8f0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:8px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:8px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
.stat-card{background:#ffffff;border:1px solid #e3e6e8;border-radius:10px;padding:24px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.02);transition:all .2s,background-color 0.3s,border-color 0.3s}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:#d5d9db;transform:translateY(-2px)}
.stat-num{font-size:36px;font-weight:700;color:#FF9900;line-height:1;letter-spacing:-.5px}
.stat-label{font-size:12px;font-weight:600;color:#5f6b7a;text-transform:uppercase;letter-spacing:.6px;margin-top:10px}
.tbl-wrap{border:1px solid #e3e6e8;border-radius:8px;overflow:hidden;margin:0 28px 24px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
.tbl th{text-align:left;padding:14px 18px;background:#f7f8f9;font-weight:600;color:#414d5c;font-size:13px;border-bottom:1px solid #e3e6e8;letter-spacing:.2px;transition:background-color 0.3s,color 0.3s}
.tbl td{padding:14px 18px;border-bottom:1px solid #f0f1f2;color:#1a1c1e}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FFF3E0}
.do,.dont{border-radius:8px;padding:18px 22px;font-size:13px;line-height:1.8;border:1px solid}
.do{background:#f2fcf3;border-color:#86e18a;border-left:4px solid #16a34a}
.dont{background:#fff5f5;border-color:#fca5a5;border-left:4px solid #dc2626}
.do strong{color:#16a34a;font-size:14px}.dont strong{color:#d32f2f;font-size:14px}
.do ul,.dont ul{margin-top:8px;padding-left:20px}
.state-label{display:inline-block;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;margin-bottom:10px;border:1px solid}
.state-active{background:#f2fcf3;color:#16a34a;border-color:#86e18a}
.state-selected{background:#eff6ff;color:#2563eb;border-color:#93c5fd}
.state-disabled{background:#f8f9fa;color:#6b7280;border-color:#d1d5db}
.state-service{background:#fffbeb;color:#92400e;border-color:#fcd34d}
.note{background:#fffbf0;border:1px solid #f5d56e;border-left:4px solid #d4a00e;border-radius:8px;padding:16px 20px;font-size:13px;color:#6d5400;margin:20px 28px;line-height:1.7}
.note-blue{background:#FFF3E0;border:1px solid #FFD180;border-left:4px solid #FF9900;color:#3B2000}
.warn{background:#fff5f5;border:1px solid #fca5a5;border-left:4px solid #dc2626;border-radius:8px;padding:16px 20px;font-size:13px;color:#991b1b;margin:20px 28px;line-height:1.7}
.flow-num{display:inline-flex;width:28px;height:28px;border-radius:50%;background:#FF9900;color:#ffffff;font-size:13px;font-weight:700;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0;text-shadow:0 0 1px rgba(255,255,255,0.5)}
.ann{font-size:13px;line-height:1.5;margin-bottom:16px;display:flex;align-items:flex-start}
.ann-body{display:flex;flex-direction:column}.ann strong{display:block;margin-bottom:2px;font-size:13px;font-weight:600;color:#1a1c1e}.ann span{color:#5f6b7a;font-size:12px}
.callout{font-size:12px;line-height:1.5;margin-bottom:12px;padding:12px 14px;border-radius:8px;background:#ffffff;border:1px solid #e9ebed;border-left:3px solid #e9ebed}.callout strong{display:block;margin-bottom:2px;font-size:12px;font-weight:600;color:#1a1c1e}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#232f3e;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;transition:transform .4s cubic-bezier(.4,0,.2,1);pointer-events:none;box-shadow:0 4px 16px rgba(0,7,22,.2);border-left:3px solid #FF9900}
.toast.show{transform:translateX(-50%) translateY(0)}
.site-footer{padding:32px 32px;font-size:12px;color:#5f6b7a;border-top:1px solid #e9ebed;margin-top:64px;background:#ffffff;text-align:center}
.site-footer a{color:#FF9900;text-decoration:none;font-weight:500}
.site-footer a:hover{color:#CC7A00;text-decoration:underline}
.swatch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;padding:0 24px 24px}
.swatch{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .12s}
.swatch:hover{background:#FFF3E0;border-color:#e9ebed}
.swatch-color{width:36px;height:36px;border-radius:8px;border:1px solid #e9ebed;flex-shrink:0}
.swatch-name{font-size:13px;font-weight:600;color:#1a1c1e}
.swatch-hex{font-size:11px;font-family:'SF Mono',Menlo,monospace;color:#5f6b7a}
.bcx-hero{position:relative;display:block;border-radius:16px;overflow:hidden;border:1px solid #e9ebed;text-decoration:none;background:linear-gradient(135deg,#232f3e 0%,#37475a 50%,#232f3e 100%);aspect-ratio:16/9;max-width:100%;transition:box-shadow .3s,transform .3s}
.bcx-hero:hover{box-shadow:0 4px 20px rgba(0,7,22,.15);transform:translateY(-2px)}
.bcx-hero-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:32px;text-align:center}
.bcx-icon{width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,#FF9900,#FFD814);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,153,0,.3)}
.bcx-icon svg{width:36px;height:36px}
.bcx-title{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.3px}
.bcx-sub{font-size:14px;color:rgba(255,255,255,.7);max-width:480px;line-height:1.6}
.bcx-cta{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:8px 20px;border-radius:8px;color:#fff;font-size:13px;font-weight:600;margin-top:8px;transition:all .15s;cursor:pointer;text-decoration:none}
.bcx-cta:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3)}
.bcx-badge{position:absolute;top:16px;right:16px;background:rgba(0,7,22,.5);backdrop-filter:blur(8px);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.1)}
@media(min-width:1400px){.content{max-width:1080px}}
@media(max-width:1024px){.content{padding:28px 24px}.mm-grid{grid-template-columns:1fr!important}.mm-left,.mm-right{display:none!important}}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.hamburger{display:flex}.overlay.open{display:block}.content-wrap{margin-left:0}.content{padding:20px 16px;padding-top:60px}.mm-grid{grid-template-columns:1fr!important}.mm-left,.mm-right{display:none!important}.stats-grid{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.bcx-title{font-size:20px}.bcx-sub{font-size:12px}.bcx-hero-inner{padding:20px}.preview{margin:0 16px 12px}.note,.warn{margin:12px 16px}.spec{margin:0 16px 16px}.tbl-wrap{margin:0 16px 12px}.hero{padding:32px 24px;margin-bottom:24px}.hero-title{font-size:32px}.hero-desc{font-size:15px}.hero-actions{flex-direction:column}.hero-actions .btn{width:100%;justify-content:center}.hero-logo{width:90px;top:16px;left:16px}.section-header{margin:-20px -16px 24px -16px;padding:32px 24px 24px}}
@media(max-width:600px){.grid-2,.grid-3{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr}.content{padding:16px 12px;padding-top:56px}.page-title{font-size:20px}.page-desc{font-size:13px}.card{border-radius:12px}.card-title{padding:16px 16px 8px;font-size:15px}.preview{margin:0 16px 12px;padding:20px}.site-footer{padding:20px 16px}.swatch-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));padding:0 16px 16px}.bcx-title{font-size:18px}.bcx-badge{top:10px;right:10px}.bcx-icon{width:56px;height:56px;border-radius:12px}.bcx-icon svg{width:28px;height:28px}.bcx-cta{padding:6px 16px;font-size:12px}.note,.warn{margin:12px 12px}.spec{margin:0 12px 12px}.tbl-wrap{margin:0 12px 12px}.hero{padding:24px 20px;border-radius:12px;margin-bottom:20px}.hero-title{font-size:28px}.hero-desc{font-size:14px;margin-bottom:20px}.hero-badge{font-size:11px;padding:5px 12px}.hero-logo{width:80px;top:12px;left:12px}}
@media(max-width:380px){.content{padding:12px 8px;padding-top:52px}.page-title{font-size:18px}.stats-grid{gap:8px}.stat-card{padding:14px}.stat-num{font-size:24px}.card{margin-bottom:14px}}

/* Section Headers (Modern, Elegant) */
.section-header{padding:40px 32px 32px;background:linear-gradient(135deg,#f8fafb 0%,#eef3f8 100%);border-left:4px solid #0972d3;margin:-24px -32px 32px -32px;border-radius:0}
.section-header__content{}
.section-header__title{font-size:28px;font-weight:700;color:#1a1c1e;margin:0 0 8px;letter-spacing:-0.5px;line-height:1.2}
.section-header__desc{font-size:15px;color:#5f6368;margin:0;line-height:1.6;max-width:600px}

/* Accessibility */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

:focus-visible {
  outline: 2px solid #0972d3;
  outline-offset: 2px;
}

/* Code Examples & Syntax Highlighting */
.psp-code-examples{border:1px solid var(--color-outline-variant,#d5d9d9);border-radius:8px;overflow:hidden;margin:12px 0}
.psp-code-examples__tabs{display:flex;gap:0;background:var(--color-surface-variant,#f5f5f5);border-bottom:1px solid var(--color-outline-variant,#d5d9d9);overflow-x:auto}
.psp-code-examples__tab{padding:10px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:#565656;white-space:nowrap;border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s}
.psp-code-examples__tab:hover{color:#0972d3;background:rgba(9,114,211,0.04)}
.psp-code-examples__tab--active{color:#0972d3;border-bottom-color:#0972d3;background:#fff}
.psp-code-examples__panel{display:none;position:relative}
.psp-code-examples__panel--active{display:block}
.psp-code-examples__copy{position:absolute;top:8px;right:8px;display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border:1px solid var(--color-outline-variant,#d5d9d9);border-radius:6px;background:var(--color-surface,#fff);color:#565656;font-size:12px;cursor:pointer;z-index:1;transition:background 0.15s,color 0.15s}
.psp-code-examples__copy:hover{background:#f0f4ff;color:#0972d3;border-color:#0972d3}
.psp-code-examples__pre{margin:0;padding:16px;padding-right:90px;overflow-x:auto;background:var(--color-surface,#fff);font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:12.5px;line-height:1.6;tab-size:2}
.psp-code-examples__code{white-space:pre;color:#1a1a1a}
.psp-code-examples__section{margin-bottom:24px}
.psp-code-examples__title{font-size:15px;font-weight:600;margin-bottom:8px;color:var(--color-on-surface,#1a1a1a)}

/* Syntax Highlighting Token Colors */
.psp-hl-keyword{color:#7c3aed}
.psp-hl-string{color:#16a34a}
.psp-hl-comment{color:#6b7280;font-style:italic}
.psp-hl-tag{color:#0972d3}
.psp-hl-attr{color:#b45309}
.psp-hl-number{color:#0891b2}

/* Dark mode overrides for syntax highlighting */
[data-theme="dark"] .psp-code-examples__pre{background:var(--color-surface,#1a1a2e)}
[data-theme="dark"] .psp-code-examples__code{color:#e2e8f0}
[data-theme="dark"] .psp-code-examples__tabs{background:var(--color-surface-variant,#2a2a3e)}
[data-theme="dark"] .psp-code-examples__tab--active{background:var(--color-surface,#1a1a2e)}
[data-theme="dark"] .psp-hl-keyword{color:#a78bfa}
[data-theme="dark"] .psp-hl-string{color:#4ade80}
[data-theme="dark"] .psp-hl-comment{color:#9ca3af}
[data-theme="dark"] .psp-hl-tag{color:#60a5fa}
[data-theme="dark"] .psp-hl-attr{color:#fbbf24}
[data-theme="dark"] .psp-hl-number{color:#22d3ee}
</style>

<script>
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200)}
function toggleCode(btn){var block=btn.nextElementSibling;if(block&&block.classList.contains('code-block')){block.classList.toggle('visible');btn.classList.toggle('open');btn.textContent=block.classList.contains('visible')?'▾ Hide code':'▸ Show code'}}
function copySpec(el){var text=el.textContent||el.innerText;if(window.PSP&&window.PSP.features&&window.PSP.features.clipboard){window.PSP.features.clipboard.copy(text);var orig=el.textContent;el.textContent='\u2713 Copied!';setTimeout(function(){el.textContent=orig},1200)}else{navigator.clipboard.writeText(text).then(function(){var orig=el.textContent;el.textContent='\u2713 Copied!';setTimeout(function(){el.textContent=orig},1200);toast('Copied: '+text.substring(0,60))})}return false}
function toggleSidebar(){var s=document.getElementById('sidebar');var o=document.getElementById('overlay');s.classList.toggle('open');o.classList.toggle('open')}
var NAV_GROUPS=[
  {title:'GETTING STARTED',items:[{icon:'🏠',label:'Overview'}]},
  {title:'DESIGN',items:[
    {icon:'🎨',label:'Foundations'},
    {icon:'🧩',label:'Components'},
    {icon:'📐',label:'Patterns'},
    {icon:'⚡',label:'States & Behavior'}
  ]},
  {title:'CONTENT',items:[
    {icon:'✏️',label:'Content Guidelines'},
    {icon:'🧠',label:'Mental Model'}
  ]},
  {title:'ADVANCED',items:[
    {icon:'♿',label:'Accessibility'},
    {icon:'🎯',label:'Decision Framework'}
  ]},
  {title:'DOCUMENTATION',items:[
    {icon:'⭐',label:'Service & Pay Baseline'}
  ]},
  {title:'INTERACTIVE',items:[
    {icon:'🎬',label:'Motion Tokens'},
    {icon:'🎮',label:'Playground'},
    {icon:'📋',label:'Changelog'},
    {icon:'📱',label:'Breakpoints'},
    {icon:'💻',label:'Code Examples'}
  ]}
];
var sidebarNav=document.getElementById('sidebarNav');
var contentEl=document.getElementById('content');
var tabIdx=0;
NAV_GROUPS.forEach(function(group){
  var groupTitle=document.createElement('div');
  groupTitle.className='nav-group-title';
  groupTitle.textContent=group.title;
  sidebarNav.appendChild(groupTitle);
  group.items.forEach(function(item){
    var d=document.createElement('div');
    d.className='nav-item'+(tabIdx===0?' active':'');
    d.textContent=item.label;
    var currentIdx=tabIdx;
    d.onclick=function(){switchTab(currentIdx)};
    sidebarNav.appendChild(d);
    tabIdx++;
  });
});
function switchTab(idx){
  document.querySelectorAll('.nav-item').forEach(function(n,i){n.className=i===idx?'nav-item active':'nav-item'});
  document.querySelectorAll('.sec').forEach(function(s,i){s.className=i===idx?'sec active':'sec'});
  window.scrollTo({top:0,behavior:'smooth'});
  var s=document.getElementById('sidebar'),o=document.getElementById('overlay');
  if(s.classList.contains('open')){s.classList.remove('open');o.classList.remove('open')}
}
</script>
