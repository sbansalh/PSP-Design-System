<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSP Design System · v2.0.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cs-bg:#f2f3f3;--cs-bg-alt:#fafafa;
  --cs-surface:#ffffff;--cs-border:#e9ebed;--cs-border-divider:#e9ebed;
  --cs-text-primary:#000716;--cs-text-secondary:#5f6b7a;--cs-text-label:#414d5c;
  --cs-text-link:#0972d3;--cs-text-link-hover:#033160;
  --cs-accent:#0972d3;--cs-accent-light:#e9f3ff;
  --cs-success:#037f0c;--cs-success-bg:#f2fcf3;
  --cs-error:#d91515;--cs-error-bg:#fff7f7;
  --cs-warning:#8d6605;--cs-warning-bg:#fffce9;
  --cs-info:#0972d3;--cs-info-bg:#f0f7ff;
  --cs-header-bg:#232f3e;
  --psp-page:#F7FAFA;--psp-primary:#0F1111;--psp-secondary:#565959;
  --psp-link:#2162A1;--psp-success:#0B7B3C;--psp-muted:#888C8C;--psp-border:#D5D9D9;
  --psp-badge-blue:#0A7CD1;--psp-cta:#FFD814;--psp-selected-bg:#EDF8FF;
  --psp-selected-border:#2162A1;--psp-error:#CC0C39;--psp-badge-gray-bg:#E3E6E6;
  --psp-badge-gray-text:#232F3E;--psp-savings:#E8FFF8;--psp-address:#F7FEFF;
  --psp-divider:#6F7373;
}
body{font-family:'Amazon Ember',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fafafa;color:var(--cs-text-primary);line-height:1.6;font-size:14px;display:flex;min-height:100vh;-webkit-font-smoothing:antialiased}
.sidebar{width:280px;background:#ffffff;position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow-y:auto;transition:transform .3s ease;border-right:1px solid #e9ebed}
.sidebar-header{padding:32px 24px 28px;border-bottom:1px solid #e9ebed}
.sidebar-logo{font-size:32px;font-weight:700;color:#0F1111;letter-spacing:-1px}
.sidebar-logo-sub{font-size:15px;color:#5f6b7a;margin-top:4px;font-weight:400}
.sidebar-version{display:inline-block;background:#e9f3ff;color:#0972d3;font-size:11px;font-weight:700;padding:4px 12px;border-radius:6px;margin-top:12px;letter-spacing:.3px}
.sidebar-nav{flex:1;padding:16px 0}
.nav-group-title{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1px;padding:20px 24px 8px;margin-top:8px}
.nav-group-title:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 24px;font-size:15px;color:#374151;cursor:pointer;transition:all .2s;border-left:3px solid transparent;font-weight:400}
.nav-item:hover{background:#f9fafb;color:#0F1111}
.nav-item.active{color:#0972d3;border-left-color:#0972d3;background:#f0f7ff;font-weight:600}
.nav-icon{font-size:20px;width:24px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:12px;font-weight:600;color:#6b7280;background:#f3f4f6;padding:2px 8px;border-radius:10px;min-width:24px;text-align:center}
.nav-item.active .nav-badge{background:#dbeafe;color:#2563eb}
.sidebar-footer{padding:20px 24px;border-top:1px solid #e9ebed;font-size:11px;color:#6b7280;display:flex;justify-content:space-between;align-items:center}
.sidebar-footer a{color:#0972d3;text-decoration:none;font-weight:600;font-size:12px}
.sidebar-footer a:hover{color:#033160}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:300;width:40px;height:40px;border-radius:8px;background:#ffffff;border:1px solid #e3e6e8;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.hamburger span{display:block;width:18px;height:2px;background:#374151;margin:3px auto;border-radius:1px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;backdrop-filter:blur(2px)}
.content-wrap{margin-left:280px;flex:1;min-height:100vh;display:flex;flex-direction:column;background:#fafafa}
.content{max-width:1120px;width:100%;margin:0 auto;padding:40px 48px;flex:1}
.sec{display:none;animation:fadeIn .25s ease}.sec.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.hero{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:16px;padding:48px 56px;margin-bottom:32px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;right:0;width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,.1) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-block;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);color:#fff;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,.3)}
.hero-title{font-size:42px;font-weight:700;color:#fff;letter-spacing:-1px;margin-bottom:16px;line-height:1.1}
.hero-desc{font-size:17px;color:rgba(255,255,255,.95);line-height:1.7;margin-bottom:28px;max-width:680px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;border:none;font-family:inherit}
.btn-primary{background:#fff;color:#667eea;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.btn-primary:hover{background:#f8f9fa;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.btn-secondary{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);backdrop-filter:blur(8px)}
.btn-secondary:hover{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.5)}
.page-title{font-size:28px;font-weight:700;color:var(--cs-text-primary);letter-spacing:-.4px;margin-bottom:8px;line-height:1.2}
.page-desc{font-size:15px;color:var(--cs-text-secondary);margin-bottom:32px;line-height:1.7;max-width:720px}
.card{background:var(--cs-surface);border:1px solid #e3e6e8;border-radius:12px;padding:0;margin-bottom:24px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.02)}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06);border-color:#d5d9db}
.card-title{font-size:17px;font-weight:700;color:var(--cs-text-primary);text-transform:none;letter-spacing:-.2px;margin-bottom:0;padding:24px 28px 16px;line-height:1.3;border-bottom:1px solid #f5f5f5}
.preview{background:#fafafa;border:1px solid #e9ebed;border-radius:8px;padding:32px;display:flex;justify-content:center;align-items:center;min-height:80px;flex-wrap:wrap;margin:20px 28px 20px}
.spec{font-size:12px;color:#5a6c7d;font-family:'SF Mono',Menlo,Consolas,monospace;background:#f7f8f9;border:1px solid #e3e6e8;padding:8px 14px;border-radius:6px;margin:0 28px 24px;cursor:pointer;transition:all .2s;display:inline-block;word-break:break-all;line-height:1.6}
.spec:hover{background:#e9f3ff;border-color:#0972d3;color:#0972d3}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:8px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:8px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
.stat-card{background:var(--cs-surface);border:1px solid #e3e6e8;border-radius:10px;padding:24px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.02);transition:all .2s}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:#d5d9db;transform:translateY(-2px)}
.stat-num{font-size:36px;font-weight:700;color:#0972d3;line-height:1;letter-spacing:-.5px}
.stat-label{font-size:12px;font-weight:600;color:#5f6b7a;text-transform:uppercase;letter-spacing:.6px;margin-top:10px}
.tbl-wrap{border:1px solid #e3e6e8;border-radius:8px;overflow:hidden;margin:0 28px 24px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
.tbl th{text-align:left;padding:14px 18px;background:#f7f8f9;font-weight:600;color:#414d5c;font-size:13px;border-bottom:1px solid #e3e6e8;letter-spacing:.2px}
.tbl td{padding:14px 18px;border-bottom:1px solid #f0f1f2;color:var(--cs-text-primary)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--cs-accent-light)}
.do,.dont{border-radius:8px;padding:18px 22px;font-size:13px;line-height:1.8;border:1px solid}
.do{background:#f2fcf3;border-color:#86e18a;border-left:4px solid #16a34a}
.dont{background:#fff5f5;border-color:#fca5a5;border-left:4px solid #dc2626}
.do strong{color:var(--cs-success);font-size:14px}.dont strong{color:var(--cs-error);font-size:14px}
.do ul,.dont ul{margin-top:8px;padding-left:20px}
.state-label{display:inline-block;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;margin-bottom:10px;border:1px solid}
.state-active{background:#f2fcf3;color:#16a34a;border-color:#86e18a}
.state-selected{background:#eff6ff;color:#2563eb;border-color:#93c5fd}
.state-disabled{background:#f8f9fa;color:#6b7280;border-color:#d1d5db}
.note{background:#fffbf0;border:1px solid #f5d56e;border-left:4px solid #d4a00e;border-radius:8px;padding:16px 20px;font-size:13px;color:#6d5400;margin:20px 28px;line-height:1.7}
.note-blue{background:#f0f7ff;border:1px solid #b8d9f5;border-left:4px solid #0972d3;color:#0d3a61}
.warn{background:#fff5f5;border:1px solid #fca5a5;border-left:4px solid #dc2626;border-radius:8px;padding:16px 20px;font-size:13px;color:#991b1b;margin:20px 28px;line-height:1.7}
.flow-num{display:inline-flex;width:24px;height:24px;border-radius:50%;background:var(--cs-accent);color:#fff;font-size:11px;font-weight:700;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0}
.ann{font-size:13px;line-height:1.5;margin-bottom:16px;display:flex;align-items:flex-start}
.ann-body{display:flex;flex-direction:column}.ann strong{display:block;margin-bottom:2px;font-size:13px;font-weight:600;color:var(--cs-text-primary)}.ann span{color:var(--cs-text-secondary);font-size:12px}
.callout{font-size:12px;line-height:1.5;margin-bottom:12px;padding:12px 14px;border-radius:8px;background:var(--cs-surface);border:1px solid var(--cs-border);border-left:3px solid var(--cs-border)}.callout strong{display:block;margin-bottom:2px;font-size:12px;font-weight:600;color:var(--cs-text-primary)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--cs-header-bg);color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;transition:transform .4s cubic-bezier(.4,0,.2,1);pointer-events:none;box-shadow:0 4px 16px rgba(0,7,22,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
.site-footer{padding:32px 48px;font-size:12px;color:#5f6b7a;border-top:1px solid #e9ebed;margin-top:64px;background:#ffffff;text-align:center}
.site-footer a{color:#0972d3;text-decoration:none;font-weight:500}
.site-footer a:hover{color:#033160;text-decoration:underline}
.swatch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;padding:0 24px 24px}
.swatch{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .12s}
.swatch:hover{background:var(--cs-accent-light);border-color:var(--cs-border)}
.swatch-color{width:36px;height:36px;border-radius:8px;border:1px solid var(--cs-border);flex-shrink:0}
.swatch-name{font-size:13px;font-weight:600;color:var(--cs-text-primary)}
.swatch-hex{font-size:11px;font-family:'SF Mono',Menlo,monospace;color:var(--cs-text-secondary)}
.bcx-hero{position:relative;display:block;border-radius:16px;overflow:hidden;border:1px solid var(--cs-border);text-decoration:none;background:linear-gradient(135deg,#232f3e 0%,#37475a 50%,#232f3e 100%);aspect-ratio:16/9;max-width:100%;transition:box-shadow .3s,transform .3s}
.bcx-hero:hover{box-shadow:0 4px 20px rgba(0,7,22,.15);transform:translateY(-2px)}
.bcx-hero-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:32px;text-align:center}
.bcx-icon{width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,#0972d3,#44b9d6);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(9,114,211,.3)}
.bcx-icon svg{width:36px;height:36px}
.bcx-title{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.3px}
.bcx-sub{font-size:14px;color:rgba(255,255,255,.7);max-width:480px;line-height:1.6}
.bcx-cta{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:8px 20px;border-radius:8px;color:#fff;font-size:13px;font-weight:600;margin-top:8px;transition:all .15s;cursor:pointer;text-decoration:none}
.bcx-cta:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3)}
.bcx-badge{position:absolute;top:16px;right:16px;background:rgba(0,7,22,.5);backdrop-filter:blur(8px);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.1)}
@media(min-width:1400px){.content{max-width:1080px}}
@media(max-width:1024px){.content{padding:28px 24px}.mm-grid{grid-template-columns:1fr!important}.mm-left,.mm-right{display:none!important}}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.hamburger{display:flex}.overlay.open{display:block}.content-wrap{margin-left:0}.content{padding:20px 16px;padding-top:60px}.mm-grid{grid-template-columns:1fr!important}.mm-left,.mm-right{display:none!important}.stats-grid{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.bcx-title{font-size:20px}.bcx-sub{font-size:12px}.bcx-hero-inner{padding:20px}.preview{margin:0 16px 12px}.note,.warn{margin:12px 16px}.spec{margin:0 16px 16px}.tbl-wrap{margin:0 16px 12px}.hero{padding:32px 24px;margin-bottom:24px}.hero-title{font-size:32px}.hero-desc{font-size:15px}.hero-actions{flex-direction:column}.hero-actions .btn{width:100%;justify-content:center}}
@media(max-width:600px){.grid-2,.grid-3{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr}.content{padding:16px 12px;padding-top:56px}.page-title{font-size:20px}.page-desc{font-size:13px}.card{border-radius:12px}.card-title{padding:16px 16px 8px;font-size:15px}.preview{margin:0 16px 12px;padding:20px}.site-footer{padding:20px 16px}.swatch-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));padding:0 16px 16px}.bcx-title{font-size:18px}.bcx-badge{top:10px;right:10px}.bcx-icon{width:56px;height:56px;border-radius:12px}.bcx-icon svg{width:28px;height:28px}.bcx-cta{padding:6px 16px;font-size:12px}.note,.warn{margin:12px 12px}.spec{margin:0 12px 12px}.tbl-wrap{margin:0 12px 12px}.hero{padding:24px 20px;border-radius:12px;margin-bottom:20px}.hero-title{font-size:28px}.hero-desc{font-size:14px;margin-bottom:20px}.hero-badge{font-size:11px;padding:5px 12px}}
@media(max-width:380px){.content{padding:12px 8px;padding-top:52px}.page-title{font-size:18px}.stats-grid{gap:8px}.stat-card{padding:14px}.stat-num{font-size:24px}.card{margin-bottom:14px}}
</style>
</head>
<body>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">PSP</div>
    <div class="sidebar-logo-sub">Design System</div>
    <span class="sidebar-version">v2.0.0</span>
  </div>
  <div class="sidebar-nav" id="sidebarNav"></div>
  <div class="sidebar-footer">
    <a href="https://www.figma.com/design/XoqbHriFr2Efq18TBPG6VQ/Modernised-PSP-toolkit?node-id=9-1857" target="_blank">Figma &#8599;</a>
    <span>v2.0.0</span>
  </div>
</nav>
<main class="content-wrap">
  <div class="content" id="content"></div>
  <footer class="site-footer">PSP Design System &middot; v2.0.0 &middot; <a href="https://www.figma.com/design/XoqbHriFr2Efq18TBPG6VQ/Modernised-PSP-toolkit?node-id=9-1857" target="_blank">Figma Source &#8599;</a></footer>
</main>
<div class="toast" id="toast"></div>
<script>
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200)}
function copySpec(el){var text=el.textContent||el.innerText;navigator.clipboard.writeText(text).then(function(){var orig=el.textContent;el.textContent='\u2713 Copied!';setTimeout(function(){el.textContent=orig},1200);toast('Copied: '+text.substring(0,60))});return false}
function toggleSidebar(){var s=document.getElementById('sidebar');var o=document.getElementById('overlay');s.classList.toggle('open');o.classList.toggle('open')}
var NAV_GROUPS=[
  {title:'GETTING STARTED',items:[{icon:'🏠',label:'Overview'}]},
  {title:'DESIGN',items:[
    {icon:'🎨',label:'Foundations',badge:'5'},
    {icon:'🧩',label:'Components',badge:'12'},
    {icon:'📐',label:'Patterns',badge:'8'},
    {icon:'⚡',label:'States & Behavior'}
  ]},
  {title:'DOCUMENTATION',items:[
    {icon:'✏️',label:'Content Guidelines'},
    {icon:'🧠',label:'Mental Model'},
    {icon:'{}',label:'Developer Handoff'},
    {icon:'⭐',label:'Baseline CX'}
  ]},
  {title:'ADVANCED',items:[{icon:'🎯',label:'Decision Framework'}]}
];
var sidebarNav=document.getElementById('sidebarNav');
var contentEl=document.getElementById('content');
var tabIdx=0;
NAV_GROUPS.forEach(function(group){
  var groupTitle=document.createElement('div');
  groupTitle.className='nav-group-title';
  groupTitle.textContent=group.title;
  sidebarNav.appendChild(groupTitle);
  group.items.forEach(function(item){
    var d=document.createElement('div');
    d.className='nav-item'+(tabIdx===0?' active':'');
    d.innerHTML='<span class="nav-icon">'+item.icon+'</span>'+item.label+(item.badge?'<span class="nav-badge">'+item.badge+'</span>':'');
    var currentIdx=tabIdx;
    d.onclick=function(){switchTab(currentIdx)};
    sidebarNav.appendChild(d);
    tabIdx++;
  });
});
function switchTab(idx){
  document.querySelectorAll('.nav-item').forEach(function(n,i){n.className=i===idx?'nav-item active':'nav-item'});
  document.querySelectorAll('.sec').forEach(function(s,i){s.className=i===idx?'sec active':'sec'});
  window.scrollTo({top:0,behavior:'smooth'});
  var s=document.getElementById('sidebar'),o=document.getElementById('overlay');
  if(s.classList.contains('open')){s.classList.remove('open');o.classList.remove('open')}
}
</script>
<script src="app.js"></script>
</body>
</html>
